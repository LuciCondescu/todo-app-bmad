name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todo_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d todo_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/todo_app
      PORT: '3000'
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
      NODE_ENV: test
      CI: 'true'
      # Mirror what local devs get from `cp apps/web/.env.example apps/web/.env`.
      # The web suite needs this for the production-style URL the build inlines;
      # the perf-harness fetch stub then parses the pathname out of it.
      VITE_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate --workspace apps/api

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Unit + a11y tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
